<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bharat Defence Monitor</title>

<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇮🇳</text></svg>">

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/map.css">

</head>

<body>

<header class="topbar">

    <div class="brand">

        <div class="brand-title">
            Bharat Defence Monitor
        </div>

        <div class="brand-subtitle">
            India Military Activity Monitor
        </div>

    </div>

    <div class="header-right">

        <div id="lastUpdated">
            Loading...
        </div>

    </div>

</header>

<section class="stats-bar">

    <div class="stat-card">
        <div class="stat-number" id="military-count">0</div>
        <div class="stat-label">Military</div>
    </div>

    <div class="stat-card">
        <div class="stat-number" id="border-count">0</div>
        <div class="stat-label">Border</div>
    </div>

    <div class="stat-card">
        <div class="stat-number" id="maritime-count">0</div>
        <div class="stat-label">Maritime</div>
    </div>

    <div class="stat-card">
        <div class="stat-number" id="weather-count">0</div>
        <div class="stat-label">Weather</div>
    </div>

    <div class="stat-card">
        <div class="stat-number" id="infrastructure-count">0</div>
        <div class="stat-label">Infrastructure</div>
    </div>

    <div class="stat-card">
        <div class="stat-number" id="cyber-count">0</div>
        <div class="stat-label">Cyber</div>
    </div>

    <div class="stat-card">
        <div class="stat-number" id="strategic-count">0</div>
        <div class="stat-label">Strategic</div>
    </div>

    <div class="stat-card">
        <div class="stat-number" id="transport-count">0</div>
        <div class="stat-label">Transport</div>
    </div>

</section>

<div class="main-layout">

    <aside class="left-panel">

        <div class="panel-section">

            <h3>Layers</h3>

            <label>
                <input type="checkbox" checked id="military">
                Military Activity
                (<span id="military-layer-count">0</span>)
            </label>

            <label>
                <input type="checkbox" checked id="border">
                Border Incidents
                (<span id="border-layer-count">0</span>)
            </label>

            <label>
                <input type="checkbox" checked id="maritime">
                Maritime Activity
                (<span id="maritime-layer-count">0</span>)
            </label>

            <label>
                <input type="checkbox" checked id="weather">
                Weather Alerts
                (<span id="weather-layer-count">0</span>)
            </label>

            <label>
                <input type="checkbox" checked id="infrastructure">
                Infrastructure Projects
                (<span id="infrastructure-layer-count">0</span>)
            </label>

            <label>
                <input type="checkbox" checked id="cyber">
                Cyber Events
                (<span id="cyber-layer-count">0</span>)
            </label>

            <label>
                <input type="checkbox" checked id="strategic">
                Strategic Assets
                (<span id="strategic-layer-count">0</span>)
            </label>

            <label>
                <input type="checkbox" checked id="transport">
                Transportation Corridors
                (<span id="transport-layer-count">0</span>)
            </label>

        </div>

        <div class="panel-section">

            <h3>Legend</h3>

            <div class="legend-item">
                <span class="legend-dot military-dot"></span>
                Military
            </div>

            <div class="legend-item">
                <span class="legend-dot border-dot"></span>
                Border
            </div>

            <div class="legend-item">
                <span class="legend-dot maritime-dot"></span>
                Maritime
            </div>

            <div class="legend-item">
                <span class="legend-dot weather-dot"></span>
                Weather
            </div>

            <div class="legend-item">
                <span class="legend-dot infrastructure-dot"></span>
                Infrastructure
            </div>

            <div class="legend-item">
                <span class="legend-dot cyber-dot"></span>
                Cyber
            </div>

            <div class="legend-item">
                <span class="legend-dot strategic-dot"></span>
                Strategic Assets
            </div>

            <div class="legend-item">
                <span class="legend-dot transport-dot"></span>
                Transportation
            </div>

        </div>

    </aside>

    <main class="map-panel">

        <div id="map"></div>

    </main>

    <aside class="right-panel">

        <div class="feed-header">

            <h3>Latest Events</h3>

            <input
                type="text"
                id="searchBox"
                placeholder="Search events..."
            >

        </div>

        <div id="eventFeed">

        </div>

    </aside>

</div>

<script src="https://unpkg.com/maplibre-gl@5.6.2/dist/maplibre-gl.js"></script>

<script src="js/map.js"></script>
<script src="js/layers.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/stats.js"></script>
<script src="js/search.js"></script>
<script src="js/app.js"></script>

</body>
</html>
